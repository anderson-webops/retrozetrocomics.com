<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 840" role="img" aria-labelledby="title desc">
  <title id="title">The Fall of a Dream poster</title>
  <desc id="desc">A stylized RetroZetro poster for The Fall of a Dream with fractured red geometry, pale lettering, and a broken-apex visual motif.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#140814"/>
      <stop offset="100%" stop-color="#3b1420"/>
    </linearGradient>
    <linearGradient id="flare" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#ff9459" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ff4b4b" stop-opacity="0.2"/>
    </linearGradient>
  </defs>

  <rect width="640" height="840" fill="url(#bg)"/>
  <circle cx="492" cy="152" r="126" fill="#ff9459" opacity="0.12"/>
  <path d="M92 154 L278 92 L238 304 L92 278 Z" fill="#26142e" stroke="#ff9459" stroke-opacity="0.3"/>
  <path d="M330 122 L546 86 L472 324 L286 278 Z" fill="#431220" stroke="#ffd27d" stroke-opacity="0.22"/>
  <path d="M126 598 L260 354 L328 560 L430 326 L552 634 Z" fill="url(#flare)" opacity="0.95"/>
  <path d="M244 330 L326 518" stroke="#fff4e7" stroke-opacity="0.45" stroke-width="10"/>
  <path d="M408 292 L346 486" stroke="#fff4e7" stroke-opacity="0.35" stroke-width="8"/>
  <text x="64" y="104" fill="#ffd27d" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" letter-spacing="7">ARC 02</text>
  <text x="64" y="282" fill="#fff4e7" font-family="Arial, Helvetica, sans-serif" font-size="88" font-weight="800" letter-spacing="1">THE FALL</text>
  <text x="64" y="370" fill="#fff4e7" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="800" letter-spacing="1">OF A DREAM</text>
  <text x="64" y="694" fill="#ffb07e" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="700" letter-spacing="6">ZEGO ORDER  APEX DIVIDE  EXO RETURNS</text>
  <text x="64" y="748" fill="#f6dfe5" font-family="Arial, Helvetica, sans-serif" font-size="26">The war cracks open. The larger battle starts.</text>
</svg>
