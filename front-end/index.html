<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta
			content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
			name="viewport"
		/>
		<title>Retro Zetro Comics</title>

		<link
			href="/legacy-favicons/apple-touch-icon.png"
			rel="apple-touch-icon"
			sizes="180x180"
		/>
		<link href="/legacy-favicons/favicon.ico" rel="icon" type="image/x-icon" />
		<link
			href="/legacy-favicons/favicon-32x32.png"
			rel="icon"
			sizes="32x32"
			type="image/png"
		/>
		<link
			href="/legacy-favicons/favicon-16x16.png"
			rel="icon"
			sizes="16x16"
			type="image/png"
		/>
		<link href="/legacy-favicons/site.webmanifest" rel="manifest" />

		<meta
			content="RetroZetro Comics publishes comics, storyboard drops, and studio photo dispatches in one live archive."
			name="description"
		/>
		<meta content="#091526" name="theme-color" />
		<meta content="index,follow" name="robots" />

		<script>
			(function() {
				const prefersDark =
					window.matchMedia &&
					window.matchMedia("(prefers-color-scheme: dark)").matches;
				const setting = localStorage.getItem("vueuse-color-scheme") || "auto";
				if (setting === "dark" || (prefersDark && setting !== "light"))
					document.documentElement.classList.toggle("dark", true);
			})();
		</script>
</head>

<body>
	<div id="app"></div>
	<script src="./src/main.ts" type="module"></script>
	<noscript>
		This website requires JavaScript to function properly. Please enable
		JavaScript to continue.
	</noscript>
</body>
</html>
